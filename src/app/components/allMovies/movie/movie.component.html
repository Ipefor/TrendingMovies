<div class="movie-details">
  <img [src]="movie.image" />
  <div class="movie-info">
    <h2>{{ movie.title }}</h2>
    <p><strong>Fecha de estreno:</strong> {{ movie.releaseDate }}</p>
    <p><strong>Nota media:</strong> {{ movie.voteAverage }}</p>
    <p class="synopsis"><strong>Sinopsis:</strong> {{ movie.synopsis }}</p>
  </div>
</div>
<div class="botonVolver-container">
  <button class="botonVolver" (click)="goBack()">Volver</button>
</div>
